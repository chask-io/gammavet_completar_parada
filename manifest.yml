function:
  name: CompletarParadaFn
  runtime: python3.12
  handler: handler.lambda_handler
  description: |
    Registra como completada la parada Gammavet exacta indicada por route_stop_id
    y pickup_order_id. Usar cuando el conductor confirma un retiro exitoso.
  timeout: 300
  memory_size: 256

  layers:
    - foundationMinimal
    - foundationApi

  data:
    writes:
      - table: gammavet_test.route_stops
        mode: update
        columns: [status, actual_arrival_at, updated_at]
      - table: gammavet_test.pickup_orders
        mode: update
        columns: [status, completed, picked_up_at, updated_at]
      - table: gammavet_test.dispatch_events
        mode: insert
        columns: [event_type, actor_lambda, route_stop_id, pickup_order_id, metadata]
    reads:
      - table: gammavet_test.route_stops
        columns: [id, pickup_order_id, status, driver_id]
      - table: gammavet_test.routes
        columns: [id, driver_id]
      - table: gammavet_test.drivers
        columns: [id, phone, normalized_phone]
    rpc:
      - POST /api/gammavet/route-stops/complete-current

  parameters:
    required: []
    optional:
      - name: route_stop_id
        type: string
        description: UUID de la parada especifica que el conductor completo.
      - name: pickup_order_id
        type: string
        description: UUID de la orden de retiro asociada, para validar la parada exacta.
      - name: driver_id
        type: string
        description: UUID del conductor, si esta disponible.
      - name: driver_phone
        type: string
        description: Telefono del conductor, si esta disponible.
      - name: ticket_id
        type: string
        description: UUID de la sesion o ticket de orquestacion.
      - name: nota
        type: string
        description: Nota opcional de cierre; tambien puede contener route_stop_id/pickup_order_id.

  widget:
    enabled: false
    type: dynamic_widget
    params: []

  testing:
    handles_files: false
    produces_files: false
